[auth]
enabled = true
site_url = "https://syenxa-ai-calorie-app.vercel.app"
additional_redirect_urls = [
  "https://syenxa-ai-calorie-app.vercel.app",
  "http://localhost:5173",
  "http://127.0.0.1:5173",
]

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "10s"
otp_length = 8
otp_expiry = 3600

[auth.rate_limit]
email_sent = 10

[storage.vector]
enabled = false

[functions.analyze-meal]
verify_jwt = true
